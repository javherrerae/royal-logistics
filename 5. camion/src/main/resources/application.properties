spring.application.name=camion
spring.datasource.url=jdbc:mysql://localhost:3306/bd_camiones?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Esto ayuda a Hibernate a crear las tablas automáticamente si es un proyecto de práctica
spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true

#PUERTO A EJECUTAR !
server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true